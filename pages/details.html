<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css" />
    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <link rel="stylesheet" href="/CSS/details.css">
    <title>Asset Details</title>
</head>

<body>
    <div class="container">

        <a href="/index.html" class="back-btn"><i class="ph ph-arrow-left"></i> Back To Dashboard</a>

        <section class="title-section">
            <h1 class="asset-name">Class room projector 01</h1>
            <p class="asset-status"><span class="dot"></span>operational</p>
        </section>

        <section class="asset-details-section">

            <div class="technical-details-card">
                <div class="section-header">
                    <i class="ph-bold ph-file-text"></i>
                    <p>technical details</p>
                </div>

                <div class="detail">
                    <p class="key">Asset Code</p>
                    <p class="value">AST-1001</p>
                </div>
                <div class="detail">
                    <p class="key">Location</p>
                    <p class="value">Admin Office</p>
                </div>
                <div class="detail">
                    <p class="key">Current condition</p>
                    <p class="value">
                        <span class="condition good"><span class="dot"></span> Good</span>
                    </p>
                </div>
            </div>

            <div class="qr-code-card">
                <div class="section-header">
                    <i class="ph-bold ph-qr-code"></i>
                    <p>QR Code</p>
                </div>

                <div class="qr-code">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRRt6dWSBp9AW8jmzQLePE6OpfGjgWW6IvbeZkvMqlk7A&s=10" alt="QR Code" width="180px" height="180px">
                </div>

                <button><i class="ph ph-printer"></i> Print QR Tag</button>
            </div>

        </section>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>

    </div>
</body>

</html>
