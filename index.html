<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/phosphor-icons@1.4.2/src/css/icons.min.css">
    <link rel="stylesheet" href="style.css">
    <title>MaintainIQ</title>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <i class="fa-solid fa-screwdriver-wrench"></i>
                <h2>Maintain<span>IQ</span></h2>
            </div>
            <button class="reset-demo-data-btn">
                <i class="ph ph-arrow-clockwise"></i>
                Reset Demo Data
            </button>
        </div>
    </nav>

    <div class="container">

        <section class="title-section">
            <div class="dashboard-title">
                <h2>Dashboard</h2>
                <p>Welcome Back, Admin User!</p>
            </div>
            <button class="add-new-asset-btn">
                <i class="fa-solid fa-plus"></i>
                Add New Asset
            </button>
        </section>

        <section class="stats-cards-section">

            <div class="stats-card">
                <div class="icon-box total-assets-icon-box">
                    <i class="ph ph-cube"></i>
                </div>
                <div class="stats-card-details">
                    <p class="title">Total Assets</p>
                    <h2 class="number">5</h2>
                </div>
                <div class="icon-circle total-assets-icon-box">
                    <i class="ph ph-trend-up"></i>
                </div>
            </div>

            <div class="stats-card">
                <div class="icon-box active-issues-icon-box">
                    <i class="ph ph-warning"></i>
                </div>
                <div class="stats-card-details">
                    <p class="title">Total Assets</p>
                    <h2 class="number">1</h2>
                </div>
                <div class="icon-circle active-issues-icon-box">
                    <i class="ph ph-trend-up"></i>
                </div>
            </div>

            <div class="stats-card">
                <div class="icon-box under-maintainance-icon-box">
                    <i class="ph ph-wrench"></i>
                </div>
                <div class="stats-card-details">
                    <p class="title">Total Assets</p>
                    <h2 class="number">1</h2>
                </div>
                <div class="icon-circle under-maintainance-icon-box">
                    <i class="ph ph-trend-up"></i>
                </div>
            </div>

        </section>

        <section class="search-and-filter-section">
            <div class="input-box">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" placeholder="Search by name or code...">
            </div>
            <div class="filters">
                <div class="select-box">
                    <select class="status-filter">
                        <option disabled selected>Status</option>
                        <option value="operational">Operational</option>
                        <option value="issue reportes">Issue Reported</option>
                        <option value="under maintainance">Under Maintainance</option>
                    </select>
                    <i class="ph ph-caret-down"></i>
                </div>

                <div class="select-box">
                    <select class="location-filter">
                        <option disabled selected>Location</option>
                        <option value="auditorium">Auditorium</option>
                        <option value="computer lab">Computer Lab</option>
                    </select>
                    <i class="ph ph-caret-down"></i>
                </div>
            </div>
            
        </section>
    </div>
</body>

</html>
