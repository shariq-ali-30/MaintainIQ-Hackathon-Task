<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/phosphor-icons@1.4.2/src/css/icons.min.css">
    <link rel="stylesheet" href="style.css">
    <title>MaintainIQ</title>
</head>

<body>
    <div class="toast">
        <i class="fa-solid fa-circle-xmark" id="toast-icon"></i>
        <p class="toast-message">Message</p>
    </div>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <i class="fa-solid fa-screwdriver-wrench"></i>
                <h2>Maintain<span>IQ</span></h2>
            </div>
            <button class="reset-demo-data-btn">
                <i class="ph ph-arrow-clockwise"></i>
                Reset Demo Data
            </button>
        </div>
    </nav>

    <div class="container">

        <section class="title-section">

            <div class="dashboard-title">
                <h2>Dashboard</h2>
                <p>Welcome Back, Admin User!</p>
            </div>
            <button class="add-new-asset-btn">
                <i class="fa-solid fa-plus"></i>
                Add New Asset
            </button>

            <div class="modal-overlay">
                <div class="add-new-asset-modal">

                    <div class="modal-header">
                        <div class="icon-circle">
                            <i class="fa fa-plus"></i>
                        </div>

                        <div class="modal-title">
                            <h2>Add New Asset</h2>
                            <p>Fill in the details below to add a new asset.</p>
                        </div>
                    </div>

                    <div class="hr"></div>

                    <div class="input-fields">
                        <label>Asset Name <span>*</span></label>
                        <input type="text" placeholder="e.g., Lab Monitor 1" class="name-input">

                        <label>Location <span>*</span></label>
                        <div>
                            <select class="location-input">
                                <option selected disabled>Location</option>
                                <option>Computer Lab</option>
                                <option>Auditorium</option>
                            </select>
                            <i class="ph ph-caret-down"></i>
                        </div>
                    </div>

                    <div class="modal-btns">
                        <button class="cancel-btn">Cancle</button>
                        <button class="add-asset-btn"><i class="fa fa-plus"></i>Add Asset</button>
                    </div>

                </div>
            </div>

        </section>

        <section class="stats-cards-section">

            <div class="stats-card">
                <div class="icon-box total-assets-icon-box">
                    <i class="ph ph-cube"></i>
                </div>
                <div class="stats-card-details">
                    <p class="title">Total Assets</p>
                    <h2 class="number" id="total-assets-count">5</h2>
                </div>
                <div class="icon-circle total-assets-icon-box">
                    <i class="ph ph-trend-up"></i>
                </div>
            </div>

            <div class="stats-card">
                <div class="icon-box active-issues-icon-box">
                    <i class="ph ph-warning"></i>
                </div>
                <div class="stats-card-details">
                    <p class="title">Active Issues</p>
                    <h2 class="number" id="active-issues-count">1</h2>
                </div>
                <div class="icon-circle active-issues-icon-box">
                    <i class="ph ph-trend-up"></i>
                </div>
            </div>

            <div class="stats-card">
                <div class="icon-box under-maintenance-icon-box">
                    <i class="ph ph-wrench"></i>
                </div>
                <div class="stats-card-details">
                    <p class="title">Under Maintenance</p>
                    <h2 class="number" id="under-maintenance-count">1</h2>
                </div>
                <div class="icon-circle under-maintenance-icon-box">
                    <i class="ph ph-trend-up"></i>
                </div>
            </div>

        </section>

        <section class="search-and-filter-section">

            <div class="input-box">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" placeholder="Search by name or code...">
            </div>
            <div class="filters">
                <div class="select-box">
                    <select class="status-filter">
                        <option selected>All Statuse</option>
                        <option value="operational">Operational</option>
                        <option value="issue reportes">Issue Reported</option>
                        <option value="under maintenance">Under maintenance</option>
                    </select>
                    <i class="ph ph-caret-down"></i>
                </div>

                <div class="select-box">
                    <select class="location-filter">
                        <option selected>All Locations</option>
                        <option value="auditorium">Auditorium</option>
                        <option value="computer lab">Computer Lab</option>
                    </select>
                    <i class="ph ph-caret-down"></i>
                </div>
            </div>

        </section>

        <section class="asset-table-section">

            <table>
                <thead>
                    <tr>
                        <th>Asset Code</th>
                        <th>Asset Name</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody class="assets-data-container">
                    <!-- <tr>
                        <td class="asset-code">AST-1001</td>
                        <td class="asset-name">Computer Lab Projector</td>
                        <td class="location">Computer Lab</td>
                        <td class="status operational">
                            <p><span class="dot"></span> Operational</p>
                        </td>
                        <td class="action"><button><i class="ph ph-eye"></i> View</button></td>
                    </tr> -->
                </tbody>
            </table>

        </section>

    </div>

    <script src="script.js"></script>
</body>

</html>
