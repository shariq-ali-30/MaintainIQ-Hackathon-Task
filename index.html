<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>MaintainIQ</title>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <i class="fa-solid fa-screwdriver-wrench"></i>
                <h2>Maintain<span>IQ</span></h2>
            </div>
            <button class="reset-demo-data-btn">
                <i class="fa-solid fa-arrow-rotate-left"></i>
                Reset Demo Data
            </button>
        </div>
    </nav>

    <div class="container">

        <section class="title-section">
            <div class="dashboard-title">
                <h2>Dashboard</h2>
                <p>Welcome Back, Admin User!</p>
            </div>
            <button class="add-new-asset-btn">
                <i class="fa-solid fa-plus"></i>
                Add New Asset
            </button>
        </section>

        <section class="KPI-cards-section">

            <div class="KPI-card">
                <div class="icon-box total-assets-icon-box">
                    <i class="fa-solid fa-cube"></i>
                </div>
                <div class="KPI-card-details">
                    <p class="title">Total Assets</p>
                    <h2 class="value">5</h2>
                </div>
            </div>
            
            <div class="KPI-card">
                <div class="icon-box active-issues-icon-box">
                    <i class="fa-solid fa-cube"></i>
                </div>
                <div class="KPI-card-details">
                    <p class="title">Total Assets</p>
                    <h2 class="value">5</h2>
                </div>
            </div>
            
            <div class="KPI-card">
                <div class="icon-box under-maintainance-icon-box">
                    <i class="fa-solid fa-cube"></i>
                </div>
                <div class="KPI-card-details">
                    <p class="title">Total Assets</p>
                    <h2 class="value">5</h2>
                </div>
            </div>

        </section>
    </div>
</body>

</html>
